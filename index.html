<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Love</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: #0d0d0d;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  overflow: hidden;
  font-family: Arial, sans-serif;
}

.container {
  position: relative;
  width: 400px;
  height: 400px;
}

.heart {
  position: absolute;
  width: 24px;
  height: 24px;
  background: url("https://cdn-icons-png.flaticon.com/512/833/833472.png");
  background-size: contain;
  background-repeat: no-repeat;
  animation: pulse 1.5s infinite;
}

@keyframes pulse {
  0% { transform: scale(1); opacity: 0.8; }
  50% { transform: scale(1.3); opacity: 1; }
  100% { transform: scale(1); opacity: 0.8; }
}

.text {
  color: pink;
  font-size: 32px;
  margin-top: 10px;
}
</style>

</head>

<body>

<div class="container" id="container"></div>
<div class="text">Te amo maninha🫶🏽</div>

<script>
const container = document.getElementById("container");

for (let x = -1.5; x <= 1.5; x += 0.08) {
  for (let y = -1.5; y <= 1.5; y += 0.08) {

    let formula = Math.pow(x*x + y*y - 1, 3) - x*x*y*y*y;

    if (formula <= 0) {
      let heart = document.createElement("div");
      heart.className = "heart";

      heart.style.left = (x * 120 + 200) + "px";
      heart.style.top = (-y * 120 + 200) + "px";

      container.appendChild(heart);
    }
  }
}
</script>

</body>
</html>
